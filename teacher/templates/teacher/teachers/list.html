{% extends 'includes/base.html' %}
{% load users %}

{% block navbar_btns %}
    <a href="{% url 'teacher:teacher:create' %}"
       class="inline-flex items-center justify-center gap-2 bg-gray-900 hover:bg-gray-800 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors shadow-sm">
        <i class="bi bi-person-plus"></i> <span class="hidden sm:inline">Add Teacher</span>
    </a>
{% endblock %}

{% block navbar_title %}
    Teachers
{% endblock %}

{% block content %}
    <div class="w-full max-w-md relative mb-6">
        <div class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none">
            <i class="bi bi-search text-gray-400"></i>
        </div>
        <input hx-get="{% url 'teacher:teacher:list' %}"
               hx-trigger="keyup changed delay:300ms"
               hx-target="#hx-list-table"
               hx-swap="innerHTML"
               type="search"
               id="default-search"
               name="search"
               class="block w-full p-3 pl-11 text-sm text-gray-900 border border-gray-200 rounded-xl bg-gray-50 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all shadow-sm"
               placeholder="Search teacher...">
    </div>

    <div id="hx-list-table" class="bg-transparent sm:bg-white sm:shadow-sm rounded-xl sm:overflow-hidden">

        {% include "teacher/teachers/partial_list.html" with teachers=teachers %}

    </div>
{% endblock %}

{% extends 'includes/base.html' %}

{% block navbar_btns %}
    <a href="{% url 'teacher:attendance:create' %}"
       class="w-full sm:w-auto inline-flex justify-center items-center gap-2 bg-gray-900 hover:bg-gray-800 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors shadow-sm">
        <i class="bi bi-calendar-plus"></i> <span class="hidden sm:inline">Add Session</span>
    </a>
{% endblock %}

{% block navbar_title %}
    Sessions
{% endblock %}

{% block content %}
    <div class="bg-white p-4 rounded-xl shadow-sm mb-6 border border-gray-50 print:hidden">
        <form hx-get="{% url 'teacher:attendance:list' %}"
              hx-target="#hx-list-table"
              hx-swap="innerHTML"
              hx-trigger="change"
              class="flex flex-col sm:flex-row gap-4 items-end">

            <div class="w-full sm:w-auto flex-1 max-w-sm">
                <label for="date" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">
                    Filter by Date
                </label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="bi bi-calendar-event text-gray-400"></i>
                    </div>
                    <input type="date" name="date" id="date" value="{{ request.GET.date }}"
                           class="block w-full pl-10 pr-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-indigo-500 focus:border-indigo-500 transition-colors text-gray-700 bg-gray-50 focus:bg-white outline-none">
                </div>
            </div>
        </form>
    </div>

    <div id="hx-list-table" class="bg-transparent sm:bg-white sm:shadow-sm rounded-xl sm:overflow-hidden">
        {% include "teacher/sessions/partial_list.html" with sessions=sessions %}
    </div>
{% endblock %}

{% block extra_js %}
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Updated to delegate the event listener to the table body.
            // This ensures clicking works even after HTMX swaps new rows in.
            const tableContainer = document.getElementById("hx-list-table");

            if (tableContainer) {
                tableContainer.addEventListener("click", (e) => {
                    const row = e.target.closest(".list-item");
                    if (!row) return;

                    // Ignore clicks on links, buttons, or forms inside the row
                    if (e.target.closest("a, button, form")) return;

                    window.location.href = row.dataset.detailUrl;
                });
            }
        });
    </script>
{% endblock %}

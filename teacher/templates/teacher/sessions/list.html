{% extends 'includes/base.html' %}

{% block navbar_btns %}
    <a href="{% url 'teacher:attendance:create' %}"
       class="sm:inline-flex justify-center items-center gap-2 bg-white dark:bg-charcoal-800 border border-gray-300 dark:border-charcoal-700 text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-charcoal-700 px-4 py-2 rounded-lg text-sm font-medium transition-colors shadow-sm dark:shadow-none">
        <i class="bi bi-calendar-plus"></i> <span class="hidden sm:inline">Add Session</span>
    </a>
{% endblock %}

{% block navbar_title %}
    Sessions
{% endblock %}

{% block content %}
    <!-- Filter Section -->
    <div class="bg-white dark:bg-charcoal-800 p-3 sm:p-4 rounded-xl shadow-sm dark:shadow-none mb-6 border border-gray-50 dark:border-charcoal-700 print:hidden overflow-hidden transition-all duration-200">

        <!-- Mobile Toggle -->
        <div class="flex justify-between items-center sm:hidden cursor-pointer hover:opacity-80 transition-opacity"
             onclick="document.getElementById('filter-wrapper').classList.toggle('hidden'); document.getElementById('filter-icon').classList.toggle('rotate-180');">
            <div class="flex items-center gap-3">
                <div class="h-8 w-8 rounded-full bg-gray-50 dark:bg-charcoal-900/50 flex items-center justify-center text-gray-500 dark:text-gray-400 transition-colors">
                    <i class="bi bi-funnel text-sm"></i>
                </div>
                <span class="font-semibold text-gray-900 dark:text-white text-sm transition-colors">Filter Movements</span>
            </div>
            <i id="filter-icon"
               class="bi bi-chevron-down text-gray-400 dark:text-gray-500 transition-transform duration-200 pr-2"></i>
        </div>

        <div id="filter-wrapper" class="hidden sm:block mt-4 sm:mt-0">
            <form hx-get="{% url 'teacher:attendance:list' %}"
                  hx-target="#hx-list-table"
                  hx-swap="innerHTML"
                  hx-trigger="change, submit"
                  class="flex flex-col sm:flex-row gap-4 items-end">

                <!-- Filter by Date -->
                <div class="w-full sm:w-auto flex-1 max-w-sm">
                    <label for="date"
                           class="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-1.5 transition-colors">
                        Filter by Date
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="bi bi-calendar-event text-gray-400 dark:text-gray-500 transition-colors"></i>
                        </div>
                        <input type="date" name="date" id="date" value="{{ request.GET.date }}"
                               class="block w-full pl-10 pr-3 py-2 border border-gray-200 dark:border-charcoal-700 rounded-lg text-sm focus:ring-indigo-500 dark:focus:ring-indigo-400 focus:border-indigo-500 dark:focus:border-indigo-400 transition-colors text-gray-700 dark:text-gray-200 bg-gray-50 dark:bg-charcoal-900 focus:bg-white dark:focus:bg-charcoal-800 outline-none">
                    </div>
                </div>

            </form>
        </div>
    </div>

    <!-- Table Section -->
    <div id="hx-list-table"
         class="bg-transparent sm:bg-white dark:sm:bg-charcoal-800 sm:shadow-sm dark:shadow-none rounded-xl sm:overflow-hidden transition-colors duration-200">
        {% include "teacher/sessions/partial_list.html" with sessions=sessions %}
    </div>
{% endblock %}

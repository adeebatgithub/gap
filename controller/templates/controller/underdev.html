{% load tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction</title>

    {% tailwind_css %}

    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Optional: Add Google Fonts for a polished look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4 sm:p-8">

    <div class="max-w-2xl w-full bg-white shadow-xl shadow-gray-200/50 rounded-3xl border border-gray-100 p-8 sm:p-16 text-center">

        <!-- Construction Icon -->
        <div class="relative mb-10 flex justify-center">
            <div class="absolute bg-indigo-100 rounded-full animate-ping opacity-75 h-24 w-24"></div>
            <div class="relative h-24 w-24 bg-indigo-50 rounded-full flex items-center justify-center border-4 border-white shadow-sm z-10">
                <i class="bi bi-cone-striped text-4xl text-indigo-600"></i>
            </div>
        </div>

        <!-- Heading & Message -->
        <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight sm:text-4xl mb-4">
            Page Under Construction
        </h1>
        <p class="text-base text-gray-500 max-w-lg mx-auto mb-10 leading-relaxed">
            We're currently working hard to build this feature. It's not quite ready for the spotlight just yet, but please check back soon!
        </p>

        <!-- Action Buttons -->
        <div class="flex flex-col sm:flex-row gap-4 justify-center">

            <button onclick="history.back()"
                    class="w-full sm:w-auto inline-flex justify-center items-center gap-2 bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 px-6 py-3 rounded-xl text-sm font-semibold transition-all shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-200 cursor-pointer">
                <i class="bi bi-arrow-left"></i> Go Back
            </button>

            <a href="/"
               class="w-full sm:w-auto inline-flex justify-center items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-xl text-sm font-semibold transition-all shadow-sm shadow-indigo-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                <i class="bi bi-house"></i> Return Home
            </a>

        </div>

    </div>

</body>
</html>

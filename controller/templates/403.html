{% load tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Access Denied</title>
    {% tailwind_css %}
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased flex items-center justify-center min-h-screen p-4">

    <div class="bg-white shadow-sm rounded-xl p-8 md:p-12 max-w-lg w-full text-center border border-gray-100">
        <div class="mx-auto w-24 h-24 bg-yellow-50 rounded-full flex items-center justify-center mb-6">
            <i class="bi bi-shield-lock text-5xl text-yellow-600"></i>
        </div>

        <h1 class="text-7xl font-bold text-gray-900 mb-2">403</h1>
        <h2 class="text-2xl font-semibold text-gray-800 mb-4">Access Denied</h2>

        <p class="text-gray-600 mb-8">
            You do not have the necessary permissions to view this directory or page using the credentials that you supplied.
        </p>

        <div class="flex flex-col sm:flex-row justify-center gap-3">
            <button onclick="history.back()" class="px-6 py-2.5 rounded-lg border border-gray-300 text-gray-700 font-medium hover:bg-gray-50 transition-colors flex items-center justify-center gap-2">
                <i class="bi bi-arrow-left"></i> Go Back
            </button>
        </div>
    </div>

</body>
</html>

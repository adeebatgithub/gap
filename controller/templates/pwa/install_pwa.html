{% load static %}

<div id="pwa-install-banner"
     class="hidden fixed bottom-5 left-1/2 -translate-x-1/2 bg-white rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.15)] px-5 py-4 items-center gap-3 z-[9999] max-w-[380px] w-[90%] border-l-4 border-indigo-600 font-sans">

    <div class="flex-1">
        <div id="pwa-title" class="font-semibold text-[15px] text-gray-900">
            Install GAP App
        </div>
        <div id="pwa-subtitle" class="text-[13px] text-gray-500 mt-0.5">
            Add to home screen for quick access
        </div>
    </div>

    <div class="flex flex-col gap-1.5">
        <button id="pwa-install-btn"
                class="bg-indigo-600 text-white rounded-lg px-3.5 py-[7px] text-[13px] font-semibold whitespace-nowrap hover:bg-indigo-700 transition-colors">
            Install
        </button>

        <button id="pwa-dismiss-btn"
                class="bg-transparent text-gray-400 text-xs hover:text-gray-600 transition-colors">
            Not now
        </button>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {

        let deferredPrompt = null;

        const banner = document.getElementById('pwa-install-banner');
        const installBtn = document.getElementById('pwa-install-btn');
        const dismissBtn = document.getElementById('pwa-dismiss-btn');
        const title = document.getElementById('pwa-title');
        const subtitle = document.getElementById('pwa-subtitle');

        if (!banner || !installBtn || !dismissBtn) return;

        const DISMISS_KEY = 'pwa-dismissed';
        const DISMISS_DURATION = 7 * 24 * 60 * 60 * 1000; // 7 days

        const isStandalone =
            window.matchMedia('(display-mode: standalone)').matches ||
            window.navigator.standalone === true;

        // Do not show if already installed
        if (isStandalone) {
            return;
        }

        function showBanner() {
            banner.classList.remove('hidden');
            banner.classList.add('flex');
        }

        function hideBanner() {
            banner.classList.remove('flex');
            banner.classList.add('hidden');
        }

        function isDismissed() {
            const dismissed = localStorage.getItem(DISMISS_KEY);

            if (!dismissed) {
                return false;
            }

            const expired =
                Date.now() - Number(dismissed) > DISMISS_DURATION;

            if (expired) {
                localStorage.removeItem(DISMISS_KEY);
                return false;
            }

            return true;
        }

        // ==========================
        // Android / Chromium browsers
        // ==========================
        window.addEventListener('beforeinstallprompt', (e) => {

            e.preventDefault();

            if (isDismissed()) {
                return;
            }

            deferredPrompt = e;

            setTimeout(() => {
                if (!isStandalone) {
                    showBanner();
                }
            }, 3000);
        });

        // Install button
        installBtn.addEventListener('click', async () => {

            if (!deferredPrompt) {
                return;
            }

            deferredPrompt.prompt();

            const choiceResult = await deferredPrompt.userChoice;

            if (choiceResult.outcome === 'accepted') {
                console.log('PWA installed');
            }

            deferredPrompt = null;
            hideBanner();
        });

        // Dismiss button
        dismissBtn.addEventListener('click', () => {

            localStorage.setItem(
                DISMISS_KEY,
                Date.now().toString()
            );

            hideBanner();
        });

        // Installed
        window.addEventListener('appinstalled', () => {

            console.log('PWA successfully installed');

            deferredPrompt = null;
            hideBanner();

            localStorage.removeItem(DISMISS_KEY);
        });

        // ==========================
        // iOS Safari
        // ==========================
        const isIOS =
            /iphone|ipad|ipod/i.test(window.navigator.userAgent);

        if (
            isIOS &&
            !isStandalone &&
            !isDismissed()
        ) {

            title.textContent = 'Install GAP App';

            subtitle.textContent =
                'Tap Share → Add to Home Screen';

            installBtn.classList.add('hidden');

            setTimeout(() => {
                showBanner();
            }, 3000);
        }

    });
</script>

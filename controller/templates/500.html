{% load tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Server Error</title>
    {% tailwind_css %}
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased flex items-center justify-center min-h-screen p-4">

    <div class="bg-white shadow-sm rounded-xl p-8 md:p-12 max-w-lg w-full text-center border border-gray-100">
        <div class="mx-auto w-24 h-24 bg-red-50 rounded-full flex items-center justify-center mb-6">
            <i class="bi bi-hdd-network text-5xl text-red-500"></i>
        </div>

        <h1 class="text-7xl font-bold text-gray-900 mb-2">500</h1>
        <h2 class="text-2xl font-semibold text-gray-800 mb-4">Internal Server Error</h2>

        <p class="text-gray-600 mb-8">
            Something went wrong on our servers. We've logged the error and our team is looking into it. Please try again later.
        </p>

        <div class="flex flex-col sm:flex-row justify-center gap-3">
            <button onclick="window.location.reload()" class="px-6 py-2.5 rounded-lg bg-gray-900 text-white font-medium hover:bg-gray-800 transition-colors flex items-center justify-center gap-2">
                <i class="bi bi-arrow-clockwise"></i> Refresh Page
            </button>
        </div>
    </div>

</body>
</html>

{% if notification %}
    <div class="notification-popup" role="region" aria-label="Latest notification" aria-live="polite">
        <button class="notification-close" aria-label="Close notification">
            <svg class="w-4 h-4" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                <path d="M5 5l10 10M15 5L5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </button>
        <div class="notification-header">
            <div class="notification-icon">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M18.8 16.6C18.2 15.1 17.8 13.5 17.8 12V8c0-3.1-2.5-5.7-5.8-5.9V1.5h-1v.6c-3.3.2-5.8 2.8-5.8 5.9v4c0 1.5-.4 3.1-1 4.6-.3.7-.4 1.4-.4 2.1 0 .8.3 1.5.9 2.1.6.6 1.3.9 2.1.9h12c.8 0 1.5-.3 2.1-.9.6-.6.9-1.3.9-2.1 0-.7-.1-1.4-.4-2.1zm-2.7.4c.4-.5.6-1.1.6-1.8 0-.5.1-1.1.3-1.7.5-1.4.9-2.8.9-4.3V8c0-2.3-1.9-4.2-4.2-4.2s-4.2 1.9-4.2 4.2v4c0 1.5.4 3 .9 4.3.2.6.3 1.2.3 1.7 0 .7.2 1.3.6 1.8H16.1z"
                          fill="currentColor"/>
                    <path d="M12 24c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2z" fill="currentColor"/>
                </svg>
            </div>
            <div class="notification-content">
                <p class="notification-title">{{ notification.title }}</p>
                <p class="notification-message" id="notification-text">{{ notification.content }}</p>
                <span class="notification-time">{{ notification.date }}</span>
            </div>
        </div>
        <button class="notification-more-btn"><a href="{% url 'notifications' %}" class="flex items-center gap-1">
            More
            <svg class="w-4 h-4" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                      stroke-linejoin="round"/>
            </svg>
        </a></button>
    </div>

    <style>
        .notification-popup {
            position: absolute;
            right: 24px;
            top: 70%;
            transform: translateY(-50%);
            z-index: 100;
            width: 360px;
            max-width: calc(100% - 32px);
            min-height: 240px;
            padding: 24px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.2);
            animation: slideInNotification 0.4s ease-out forwards;
            opacity: 0;
            display: flex;
            flex-direction: column;
        }

        @keyframes slideInNotification {
            from {
                opacity: 0;
                transform: translateY(-50%) translateX(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(-50%) scale(1);
            }
        }

        .notification-popup:hover {
            background: rgba(255, 255, 255, 0.16);
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35), inset 0 1px 1px rgba(255, 255, 255, 0.25);
        }

        /* Close Button */
        .notification-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            padding: 0;
            z-index: 10;
        }

        .notification-close:hover {
            background: rgba(255, 255, 255, 0.25);
            color: rgba(255, 255, 255, 0.9);
            transform: rotate(90deg);
        }

        /* Header Section with Icon and Content */
        .notification-header {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex: 1;
        }

        /* Icon Container */
        .notification-icon {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            background: linear-gradient(135deg, #d1fb5f 0%, #b8e84a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00301c;
            flex-shrink: 0;
        }

        /* Content */
        .notification-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .notification-title {
            margin: 0 0 4px 0;
            font-weight: 700;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.95);
            font-family: "Roboto", sans-serif;
            letter-spacing: 0.4px;
            text-transform: uppercase;
            line-height: 1.3;
        }

        .notification-message {
            margin: 0 0 8px 0;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.85);
            font-weight: 400;
            line-height: 1.5;
            font-family: "Poppins", sans-serif;
            flex: 1;
        }

        .notification-time {
            display: inline-block;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* More Button */
        .notification-more-btn {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.9);
            font-size: 13px;
            font-weight: 600;
            font-family: "Roboto", sans-serif;
            letter-spacing: 0.2px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.25s ease;
            margin-top: auto;
        }

        .notification-more-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            color: #d1fb5f;
        }

        .notification-more-btn svg {
            transition: transform 0.25s ease;
        }

        .notification-more-btn:hover svg {
            transform: translateX(3px);
        }

        /* Fade Out Animation */
        .notification-popup.fade-out {
            animation: slideOutNotification 0.3s ease-in forwards;
        }

        @keyframes slideOutNotification {
            from {
                opacity: 1;
                transform: translateY(-50%) scale(1);
            }
            to {
                opacity: 0;
                transform: translateY(-50%) translateX(20px) scale(0.95);
            }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .notification-popup {
                width: calc(100% - 32px);
                max-width: 320px;
                min-height: 220px;
                padding: 20px;
            }

            .notification-icon {
                width: 48px;
                height: 48px;
            }

            .notification-title {
                font-size: 11px;
            }

            .notification-message {
                font-size: 12px;
            }

            .notification-time {
                font-size: 10px;
            }
        }

        /* Mobile Devices */
        @media (max-width: 640px) {
            .notification-popup {
                right: 16px;
                top: auto;
                bottom: 75px;
                transform: none;
                width: calc(100% - 32px);
                max-width: 100%;
                min-height: auto;
                padding: 16px;
                border-radius: 16px;
            }

            @keyframes slideInNotification {
                from {
                    opacity: 0;
                    transform: translateY(20px) scale(0.95);
                }
                to {
                    opacity: 1;
                    transform: translateY(0) scale(1);
                }
            }

            @keyframes slideOutNotification {
                from {
                    opacity: 1;
                    transform: translateY(0) scale(1);
                }
                to {
                    opacity: 0;
                    transform: translateY(20px) scale(0.95);
                }
            }

            .notification-header {
                gap: 10px;
            }

            .notification-icon {
                width: 40px;
                height: 40px;
                flex-shrink: 0;
            }

            .notification-title {
                font-size: 11px;
                margin-bottom: 3px;
            }

            .notification-message {
                font-size: 12px;
                margin-bottom: 6px;
                line-height: 1.4;
            }

            .notification-more-btn {
                padding: 10px 14px;
                font-size: 12px;
                margin-top: 10px;
            }
        }
    </style>
{% endif %}

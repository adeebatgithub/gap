{% extends 'includes/base.html' %}

{% block navbar_btns %}
    <a href="{% url 'academics:enrollment:create' %}"
       class="w-full sm:w-auto inline-flex justify-center items-center gap-2 bg-gray-900 hover:bg-gray-800 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors shadow-sm">
        <i class="bi bi-plus-circle"></i> <span class="hidden sm:inline">Enroll Student</span>
    </a>
{% endblock %}

{% block navbar_title %}
    Enrollments
{% endblock %}

{% block content %}
    <!-- Filter Section -->
    <div class="flex flex-col sm:flex-row items-end gap-4 mb-6">

        <!-- Search Field -->
        <div class="w-full sm:max-w-md relative">
            <div class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none">
                <i class="bi bi-search text-gray-400"></i>
            </div>
            <input hx-get="{% url 'academics:enrollment:list' %}"
                   hx-trigger="keyup changed delay:300ms"
                   hx-target="#hx-list-table"
                   hx-swap="innerHTML"
                   type="search"
                   id="default-search"
                   name="search"
                   class="block w-full p-3 pl-11 text-sm text-gray-900 border border-gray-200 rounded-xl bg-gray-50 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all shadow-sm"
                   placeholder="Search students...">
        </div>

        <!-- Class Filter -->
        <div class="w-full sm:w-auto flex-1 max-w-xs">
            <label for="class_name" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">
                Filter by Class
            </label>
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="bi bi-easel text-gray-400"></i>
                </div>
                <select hx-get="{% url 'academics:enrollment:list' %}"
                        hx-target="#hx-list-table"
                        hx-swap="innerHTML"
                        name="class_name"
                        id="class_name"
                        class="block w-full pl-10 pr-10 py-2 border border-gray-200 rounded-lg text-sm focus:ring-indigo-500 focus:border-indigo-500 transition-colors appearance-none text-gray-700 bg-gray-50 focus:bg-white outline-none cursor-pointer">
                    <option value="">All Classes</option>
                    {% for class in classes %}
                        <option value="{{ class }}"
                                {% if request.GET.class_name == class|stringformat:"s" %}selected{% endif %}>
                            {{ class }}
                        </option>
                    {% endfor %}
                </select>
                <!-- Custom dropdown arrow to replace default browser styling -->
                <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                    <i class="bi bi-chevron-down text-gray-400 text-xs"></i>
                </div>
            </div>
        </div>

    </div>

    <!-- Table Section -->
    <div id="hx-list-table" class="bg-transparent sm:bg-white sm:shadow-sm rounded-xl sm:overflow-hidden">

        {% include "academics/enrollments/partial_list.html" with enrollments=enrollments %}

    </div>
{% endblock %}

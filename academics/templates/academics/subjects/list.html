{% extends 'includes/base.html' %}

{% block navbar_btns %}
    <a href="{% url 'academics:subject:create' %}"
       class="sm:inline-flex justify-center items-center gap-2 bg-white dark:bg-charcoal-800 border border-gray-300 dark:border-charcoal-700 text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-charcoal-700 px-4 py-2 rounded-lg text-sm font-medium transition-colors shadow-sm dark:shadow-none">
        <i class="bi bi-plus-circle"></i> <span class="hidden sm:inline">Add Subject</span>
    </a>
{% endblock %}

{% block navbar_title %}
    Subjects
{% endblock %}

{% block content %}
    <!-- Search Section -->
    <div class="w-full max-w-md relative mb-6">
        <div class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none">
            <i class="bi bi-search text-gray-400 dark:text-gray-500 transition-colors"></i>
        </div>
        <input hx-get="{% url 'academics:subject:list' %}"
               hx-trigger="keyup changed delay:300ms"
               hx-target="#hx-list-table"
               hx-swap="innerHTML"
               type="search"
               id="default-search"
               name="search"
               class="block w-full p-3 pl-11 text-sm text-gray-900 dark:text-white border border-gray-200 dark:border-charcoal-700 rounded-xl bg-gray-50 dark:bg-charcoal-900 focus:ring-indigo-500 dark:focus:ring-indigo-400 focus:border-indigo-500 dark:focus:border-indigo-400 outline-none transition-all shadow-sm dark:shadow-none placeholder-gray-400 dark:placeholder-gray-500"
               placeholder="Search subjects...">
    </div>

    <!-- Table Section -->
    <div id="hx-list-table"
         class="bg-transparent sm:bg-white dark:sm:bg-charcoal-800 sm:shadow-sm dark:shadow-none rounded-xl sm:overflow-hidden transition-colors duration-200">

        {% include "academics/subjects/partial_list.html" with subjects=subjects %}

    </div>
{% endblock %}

{% extends 'includes/base.html' %}

{% block navbar_title %}
    Admissions
{% endblock %}

{% block navbar_btns %}
    <a href="{% url 'academics:admission:export' %}?date_from={{ request.GET.date_from }}&date_to={{ request.GET.date_to }}"
       class="w-full sm:w-auto inline-flex justify-center items-center gap-2 bg-gray-900 hover:bg-gray-800 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors shadow-sm">
        <i class="bi bi-file-earmark-spreadsheet"></i> <span class="hidden sm:inline">Export to xlsx</span>
    </a>
{% endblock %}

{% block content %}
    <!-- Filter Section -->
    <form hx-get="{% url 'academics:admission:list' %}"
          hx-trigger="keyup delay:300ms from:#default-search, change from:input"
          hx-target="#hx-list-table"
          hx-swap="innerHTML"
          class="flex flex-col sm:flex-row items-end gap-4 mb-6">

        <!-- Search -->
        <div class="w-full sm:max-w-md relative flex-1">
            <div class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none">
                <i class="bi bi-search text-gray-400"></i>
            </div>
            <input type="search" id="default-search" name="search" placeholder="Search Candidate by name..."
                   class="block w-full p-3 pl-11 text-sm text-gray-900 border border-gray-200 rounded-xl bg-gray-50 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all shadow-sm">
        </div>

        <!-- From Date -->
        <div class="w-full sm:w-auto">
            <label for="date_from" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">
                From
            </label>
            <div class="relative">
                <input type="date" id="date_from" name="date_from"
                       class="block w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-indigo-500 focus:border-indigo-500 transition-colors text-gray-700 bg-gray-50 focus:bg-white outline-none shadow-sm">
            </div>
        </div>

        <!-- To Date -->
        <div class="w-full sm:w-auto">
            <label for="date_to" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">
                To
            </label>
            <div class="relative">
                <input type="date" id="date_to" name="date_to"
                       class="block w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-indigo-500 focus:border-indigo-500 transition-colors text-gray-700 bg-gray-50 focus:bg-white outline-none shadow-sm">
            </div>
        </div>
    </form>

    <!-- Table Section -->
    <div id="hx-list-table" class="bg-transparent sm:bg-white sm:shadow-sm rounded-xl sm:overflow-hidden">

        {% include "academics/admission/partial_list.html" admissions=admissions %}

    </div>
{% endblock %}
